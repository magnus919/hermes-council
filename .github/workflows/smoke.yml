name: Smoke

on:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv python install 3.11
      - run: uv build
      - run: uv venv --python 3.11 /tmp/hermes-council-venv
      - run: uv pip install --python /tmp/hermes-council-venv/bin/python dist/*.whl
      - run: cd /tmp && /tmp/hermes-council-venv/bin/python "$GITHUB_WORKSPACE/tests/test_installed_package.py"
